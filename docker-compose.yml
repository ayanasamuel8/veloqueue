services:
  postgres:
    image: postgres:18
    container_name: veloqueue-pg 
    environment:
      POSTGRES_USER: ayana
      POSTGRES_PASSWORD: password
      POSTGRES_DB: veloqueue
    ports:
      - "5432:5432"
    volumes:
      - veloqueue-data:/var/lib/postgresql
    restart: unless-stopped

volumes:
  veloqueue-data: